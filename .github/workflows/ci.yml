name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Verify non-empty test surface
        shell: bash
        run: |
          test_count="$(find server src/api src/components src/game src/observability src/views -type f \
            \( -name '*.test.ts' -o -name '*.test.tsx' \) | wc -l)"
          test "$test_count" -gt 0
          echo "Discovered $test_count test files."
      - run: npm run test:server

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Verify non-empty browser test surface
        shell: bash
        run: |
          test_count="$(find e2e -type f -name '*.spec.ts' | wc -l)"
          test "$test_count" -gt 0
          echo "Discovered $test_count browser test files."
      - run: npm run test:e2e

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Validate production Compose isolation
        run: npm run prod:compose:check
      - name: Validate production index cache policy
        run: npm run prod:nginx:check
      - name: Build production images
        env:
          TELEGRAM_BOT_TOKEN: ci-build-placeholder
          VOID_SAGA_HOST: game.riy.contact
        run: docker compose -f docker-compose.prod.yml build api web
